syntax = "proto3";

package llmrunner;

option go_package = "github.com/magomedcoder/llm-runner/pb;pb";

service LLMRunnerService {
  rpc Ping(Empty) returns (PingResponse);

  rpc GetModels(Empty) returns (GetModelsResponse);

  rpc Generate(GenerateRequest) returns (stream GenerateResponse);
}

message Empty {}

message PingResponse {
  bool ok = 1;
}

message GetModelsResponse {
  repeated string models = 1;
}

message ChatMessage {
  int64 id = 1;
  string content = 2;
  string role = 3;
  int64 created_at = 4;
  optional string attachment_name = 5;
  optional bytes attachment_content = 6;
}

message ResponseFormat {
  string type = 1;
  optional string schema = 2;
}

message Tool {
  string name = 1;
  string description = 2;
  string parameters_json = 3;
}

message GenerateRequest {
  int64 session_id = 1;
  repeated ChatMessage messages = 2;
  string model = 3;
  repeated string stop_sequences = 4;
  optional int32 timeout_seconds = 5;
  optional float temperature = 6;
  optional int32 max_tokens = 7;
  optional int32 top_k = 8;
  optional float top_p = 9;
  optional ResponseFormat response_format = 10;
  repeated Tool tools = 11;
}

message ToolCall {
  string id = 1;
  string name = 2;
  string arguments = 3;
}

message GenerateResponse {
  string content = 1;
  bool done = 2;
  repeated ToolCall tool_calls = 3;
}
