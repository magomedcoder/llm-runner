syntax = "proto3";

package llmrunner;

option go_package = "github.com/magomedcoder/gen/llm-runner/pb/llmrunnerpb;llmrunnerpb";

service LLMRunnerService {
  rpc GetModels(Empty) returns (GetModelsResponse);

  rpc GetGpuInfo(Empty) returns (GetGpuInfoResponse);

  rpc GetServerInfo(Empty) returns (ServerInfo);

  rpc CheckConnection(Empty) returns (ConnectionResponse);

  rpc RunnerProbe(Empty) returns (RunnerProbeResponse);

  rpc SendMessage(SendMessageRequest) returns (stream ChatResponse);

  rpc Embed(EmbedRequest) returns (EmbedResponse);

  rpc EmbedBatch(EmbedBatchRequest) returns (EmbedBatchResponse);

  rpc GetLoadedModel(Empty) returns (GetLoadedModelResponse);

  rpc UnloadModel(Empty) returns (Empty);

  rpc ResetMemory(Empty) returns (Empty);
}

message Empty {}

message GetModelsResponse {
  repeated string models = 1;
}

message GpuInfo {
  string name = 1;
  int32 temperature_c = 2;
  uint64 memory_total_mb = 3;
  uint64 memory_used_mb = 4;
  uint32 utilization_percent = 5;
}

message GetGpuInfoResponse {
  repeated GpuInfo gpus = 1;
}

message ServerInfo {
  string hostname = 1;
  string os = 2;
  string arch = 3;
  int32 cpu_cores = 4;
  uint64 memory_total_mb = 5;
  repeated string models = 6;
}

message ConnectionResponse {
  bool is_connected = 1;
}

message RunnerProbeResponse {
  bool backend_connected = 1;
  ServerInfo server = 2;
  repeated GpuInfo gpus = 3;
  GetLoadedModelResponse loaded_model = 4;
}

message ChatMessage {
  int64 id = 1;
  string content = 2;
  string role = 3;
  int64 created_at = 4;
  optional string attachment_name = 5;
  optional bytes attachment_content = 6;
  optional string tool_call_id = 7;
  optional string tool_name = 8;
  optional string tool_calls_json = 9;
  optional string attachment_mime = 10;
}

message ChatResponse {
  int64 id = 1;
  string content = 2;
  string role = 3;
  int64 created_at = 4;
  bool done = 5;
  optional string tool_action_json = 6;
  optional string reasoning_content = 7;
}

message SendMessageRequest {
  int64 session_id = 1;
  repeated ChatMessage messages = 2;
  string model = 3;
  repeated string stop_sequences = 4;
  optional int32 timeout_seconds = 5;
  GenerationParams generation_params = 6;
}

message ResponseFormat {
  string type = 1;
  optional string schema = 2;
}

message Tool {
  string name = 1;
  string description = 2;
  string parameters_json = 3;
}

message GenerationParams {
  optional float temperature = 1;
  optional int32 max_tokens = 2;
  optional int32 top_k = 3;
  optional float top_p = 4;
  ResponseFormat response_format = 5;
  repeated Tool tools = 6;
  optional bool enable_thinking = 7;
}

message EmbedRequest {
  string model = 1;
  string text = 2;
}

message EmbedResponse {
  repeated float values = 1;
}

message EmbedBatchRequest {
  string model = 1;
  repeated string texts = 2;
}

message Embedding {
  repeated float values = 1;
}

message EmbedBatchResponse {
  repeated Embedding embeddings = 1;
}

message GetLoadedModelResponse {
  bool loaded = 1;
  string gguf_basename = 2;
  string display_name = 3;
}
