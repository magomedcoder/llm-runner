syntax = "proto3";

package runner;

import "common.proto";

option go_package = "github.com/magomedcoder/gen/api/pb/runnerpb;runnerpb";

service RunnerService {
  rpc GetRunners(common.Empty) returns (GetRunnersResponse);

  rpc SetRunnerEnabled(SetRunnerEnabledRequest) returns (common.Empty);

  rpc RegisterRunner(RegisterRunnerRequest) returns (common.Empty);

  rpc UnregisterRunner(UnregisterRunnerRequest) returns (common.Empty);

  rpc GetRunnersStatus(common.Empty) returns (GetRunnersStatusResponse);
}

message RegisterRunnerRequest {
  string address = 1;
}

message UnregisterRunnerRequest {
  string address = 1;
}

message GpuInfo {
  string name = 1;
  int32 temperature_c = 2;
  uint64 memory_total_mb = 3;
  uint64 memory_used_mb = 4;
  uint32 utilization_percent = 5;
}

message ServerInfo {
  string hostname = 1;
  string os = 2;
  string arch = 3;
  int32 cpu_cores = 4;
  uint64 memory_total_mb = 5;
  repeated string models = 6;
}

message LoadedModelStatus {
  bool loaded = 1;
  string display_name = 2;
  string gguf_basename = 3;
}

message RunnerInfo {
  string address = 1;
  bool enabled = 2;
  bool connected = 3;
  repeated GpuInfo gpus = 4;
  ServerInfo server_info = 5;
  string name = 6;
  LoadedModelStatus loaded_model = 7;
}

message GetRunnersResponse {
  repeated RunnerInfo runners = 1;
}

message SetRunnerEnabledRequest {
  string address = 1;
  bool enabled = 2;
}

message GetRunnersStatusResponse {
  bool has_active_runners = 1;
}
