server:
  host: "0.0.0.0"
  port: "50051"
  # metrics_listen: "127.0.0.1:9090" # опционально: HTTP /metrics в формате Prometheus (счётчики MCP из mcpclient)

log_level: "info"

database:
  host: "postgres"
  port: 5432
  username: "postgres"
  password: "postgres"
  database: "gen_db"

jwt:
  access_secret: "gen"
  refresh_secret: "gen"
  access_ttl: "15m"
  refresh_ttl: "168h"

data_dir: "./data"

mcp:
  http_allow_any: false
  http_allow_hosts: [] # разрешённые имена хостов (и суффиксы *.host) для URL MCP; loopback не нужно дублировать
  http_reuse_sessions: true # снижает latency tools/call за счёт переиспользования HTTP MCP-сессий
  # http_session_max_idle_seconds: 180 # idle TTL пула (1...600)
  # stdio_disabled: true # раскомментируйте в продакшене, если используете только HTTP-транспорты
  # stdio_command_prefixes: # непустой список = command должна быть под одним из префиксов пути (после Clean)
  #  - "/opt/mcp-servers"
  # max_mcp_servers_per_user: 20 # лимит личных MCP-серверов на пользователя; 0 = без лимита
  # max_tracked_server_ids_for_call_stats: 2048 # лимит различных server_id в in-memory per-server метриках call_tool; 0 = без лимита
  # При непустом списке: если пользователь отправил сообщение с изображением (vision), выполняются только MCP-инструменты, перечисленные как "<server_id>:<tool_name>" (имя - как на MCP-сервере, до вызова)
  # Остальные MCP-вызовы блокируются
  # tools_allowlist_when_user_image_attached:
  #   - "1:read_file"

attachment_hydrate_parallelism: 64 # параллельная подготовка вложений в истории для LLM (1...64; 0 = 8).

